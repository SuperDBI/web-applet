<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenAI Match Results</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, sans-serif;
        background: #eff6ff;
        color: #0f172a;
        padding: 24px;
      }

      .page-shell {
        max-width: 980px;
        margin: 0 auto;
        display: grid;
        gap: 20px;
      }

      header {
        display: grid;
        gap: 8px;
      }

      header h1 {
        margin: 0;
        font-size: clamp(2rem, 2.4vw, 2.6rem);
        letter-spacing: -0.04em;
      }

      header p {
        margin: 0;
        color: #475569;
        line-height: 1.7;
      }

      .message-card,
      .result-card {
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 20px 48px rgba(15, 23, 42, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.3);
      }

      .results-grid {
        display: grid;
        gap: 18px;
      }

      .result-card {
        padding: 22px;
        transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
      }

      .result-card:hover {
        transform: translateY(-2px);
        border-color: #93c5fd;
        box-shadow: 0 26px 58px rgba(15, 23, 42, 0.12);
        background: #f8fbff;
      }

      .result-title {
        margin: 0 0 10px;
        font-size: 1.08rem;
        line-height: 1.35;
        color: #0f172a;
      }

      .result-number {
        margin-right: 0.5rem;
        color: #2563eb;
        font-weight: 700;
      }

      .edu-link {
        color: #2563eb;
        text-decoration: none;
        border-bottom: 1px dashed transparent;
        font-weight: 700;
      }

      .edu-link:hover {
        border-bottom-color: #2563eb;
      }

      .result-description {
        margin: 0;
        color: #475569;
        line-height: 1.75;
        font-size: 0.96rem;
      }

      .result-source {
        margin-top: 14px;
        font-size: 0.88rem;
        color: #64748b;
      }

      .message-card {
        padding: 24px;
        color: #334155;
      }

      .message-card p {
        margin: 0;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header>
        <h1>GenAI Match Results</h1>
        <p>Rendered from the latest GenAI search data saved by <strong>match.html</strong>. Each suggestion links to a generated .edu domain and shows its summary reasoning.</p>
      </header>

      <div id="contentRoot"></div>
    </div>

    <script>
      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function getEduDomain(name) {
        if (!name) return null;
        const normalized = name
          .trim()
          .replace(/\b(University|College|Institute|School|of|and|&|The|the|State|Systems|Tech|Technology|Center|Centre|Intl|International)\b/gi, '')
          .replace(/[^a-zA-Z0-9\s]/g, '')
          .replace(/\s+/g, '')
          .toLowerCase();
        return normalized ? `https://${normalized}.edu` : null;
      }

      function parseGenAiResults(text) {
        const normalized = String(text || '').replace(/\r/g, '').trim();
        if (!normalized) return [];

        const lines = normalized.split('\n').map((line) => line.trim()).filter(Boolean);
        const items = [];
        let current = null;

        lines.forEach((line) => {
          const itemMatch = line.match(/^(\d+)\s*[\.)]\s*(.*)$/);
          if (itemMatch) {
            if (current) items.push(current);
            const payload = itemMatch[2].trim();
            const splitReason = payload.split(/[:\-–—]\s*/);
            const title = splitReason.shift().trim();
            const reason = splitReason.join(' - ').trim();
            current = {
              number: Number(itemMatch[1]),
              title: title || 'Untitled Match',
              reason: reason ? [reason] : []
            };
            return;
          }
          if (!current) return;
          if (line) current.reason.push(line);
        });

        if (current) items.push(current);

        return items.slice(0, 15).map((item, index) => ({
          number: item.number || index + 1,
          title: item.title,
          reason: item.reason.map((line) => line.replace(/^[-*•]\s*/, '').trim()).filter(Boolean)
        }));
      }

      function extractTextFromHtml(html) {
        if (!html) return '';
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        const cardNodes = Array.from(doc.querySelectorAll('.result-card:not(.message-card), .results-container .result-card'));
        if (cardNodes.length) {
          return cardNodes
            .map((card) => {
              const titleEl = card.querySelector('h2');
              const reasonEls = card.querySelectorAll('.result-reason p');
              const title = titleEl ? titleEl.textContent.trim().replace(/^\d+\.\s*/, '') : '';
              const reason = Array.from(reasonEls).map((p) => p.textContent.trim()).filter(Boolean).join(' ');
              return title ? `${title}${reason ? ': ' + reason : ''}` : '';
            })
            .filter(Boolean)
            .join('\n');
        }

        const listItems = Array.from(doc.querySelectorAll('ol li, ul li'));
        if (listItems.length) {
          return listItems.map((li) => li.textContent.trim()).filter(Boolean).join('\n');
        }

        const pre = doc.querySelector('pre');
        if (pre) return pre.textContent.trim();

        return (doc.body.textContent || '').trim();
      }

      function renderResults(items) {
        if (!items.length) return null;
        const wrapper = document.createElement('div');
        wrapper.className = 'results-grid';

        items.forEach((item) => {
          const card = document.createElement('section');
          card.className = 'result-card';

          const heading = document.createElement('h2');
          heading.className = 'result-title';
          const domain = getEduDomain(item.title);
          const titleText = `<span class="result-number">${escapeHtml(String(item.number))}.</span>`;
          if (domain) {
            heading.innerHTML = `${titleText} <a class="edu-link" href="${escapeHtml(domain)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a>`;
          } else {
            heading.innerHTML = `${titleText} ${escapeHtml(item.title)}`;
          }
          card.appendChild(heading);

          const description = document.createElement('p');
          description.className = 'result-description';
          description.textContent = item.reason.length ? item.reason.join(' ') : 'No match summary available.';
          card.appendChild(description);

          if (domain) {
            const source = document.createElement('div');
            source.className = 'result-source';
            source.textContent = domain.replace('https://', 'Website: ');
            card.appendChild(source);
          }

          wrapper.appendChild(card);
        });

        return wrapper;
      }

      function createMessageCard(message) {
        const card = document.createElement('section');
        card.className = 'message-card';
        const p = document.createElement('p');
        p.textContent = message;
        card.appendChild(p);
        return card;
      }

      function updateResults() {
        const root = document.getElementById('contentRoot');
        root.innerHTML = '';

        const text = localStorage.getItem('genaiResultsText') || sessionStorage.getItem('genaiResultsText') || '';
        const html = localStorage.getItem('genaiResultsHtml') || sessionStorage.getItem('genaiResultsHtml') || '';

        let parsed = renderResults(parseGenAiResults(text));
        if (!parsed && html) {
          const extracted = extractTextFromHtml(html);
          parsed = renderResults(parseGenAiResults(extracted || ''));
        }

        if (parsed) {
          root.appendChild(parsed);
          return;
        }

        if (html) {
          const fallback = document.createElement('section');
          fallback.className = 'result-card message-card';
          fallback.innerHTML = '<p>Raw HTML result data could not be parsed to a numbered list. Showing the raw stored content below.</p><div style="margin-top:1rem; color:#0f172a; white-space:normal; word-break:break-word;">' + escapeHtml(html) + '</div>';
          root.appendChild(fallback);
          return;
        }

        root.appendChild(createMessageCard('No GenAI results found. Run the query on match.html and then reopen this page.'));
      }

      window.addEventListener('load', updateResults);
      window.addEventListener('storage', updateResults);
    </script>
  </body>
</html>
