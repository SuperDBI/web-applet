<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenAI Match Results</title>
    <link rel="icon" type="image/png" href="capssmlog.png" />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, sans-serif;
        background: #eff6ff;
        color: #0f172a;
        padding: 24px;
      }

      .page-shell {
        max-width: 980px;
        margin: 0 auto;
        display: grid;
        gap: 20px;
      }

      header {
        display: grid;
        gap: 8px;
      }

      header h1 {
        margin: 0;
        font-size: clamp(2rem, 2.4vw, 2.6rem);
        letter-spacing: -0.04em;
      }

      header p {
        margin: 0;
        color: #475569;
        line-height: 1.7;
      }

      .message-card,
      .result-card {
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 20px 48px rgba(15, 23, 42, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.3);
      }

      .results-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 18px;
      }

      .results-list li {
        margin: 0;
      }

      .result-card {
        padding: 22px;
        transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
      }

      .result-card:hover {
        transform: translateY(-2px);
        border-color: #93c5fd;
        box-shadow: 0 26px 58px rgba(15, 23, 42, 0.12);
        background: #eff6ff;
      }

      .result-badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.79rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .result-badge-reach {
        background: #fee2e2;
        color: #991b1b;
      }

      .result-badge-target {
        background: #dbf0ff;
        color: #0c4a6e;
      }

      .result-badge-safety {
        background: #dcfce7;
        color: #166534;
      }

      .result-meta {
        display: grid;
        gap: 10px;
      }

      .result-title {
        margin: 0 0 10px;
        font-size: 1.08rem;
        line-height: 1.35;
        color: #0f172a;
      }

      .result-number {
        margin-right: 0.5rem;
        color: #2563eb;
        font-weight: 700;
      }

      .edu-link {
        color: #2563eb;
        text-decoration: none;
        border-bottom: 1px dashed transparent;
        font-weight: 700;
      }

      .edu-link:hover {
        border-bottom-color: #2563eb;
      }

      .result-description {
        margin: 0;
        color: #475569;
        line-height: 1.75;
        font-size: 0.96rem;
      }

      .result-source {
        margin-top: 14px;
        font-size: 0.88rem;
        color: #64748b;
      }

      .message-card {
        padding: 24px;
        color: #334155;
      }

      .message-card p {
        margin: 0;
        line-height: 1.7;
      }

      .raw-html-fallback {
        margin-top: 1rem;
        padding: 18px;
        border-radius: 18px;
        background: #f8fafc;
        border: 1px solid #dbeafe;
        color: #0f172a;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header>
        <h1>GenAI Match Results</h1>
        <p>Rendered from the latest GenAI search data saved by <strong>match.html</strong>. Each suggestion links to a generated .edu domain and shows its summary reasoning.</p>
      </header>

      <div id="contentRoot"></div>
    </div>

    <script>
      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function getEduDomain(name) {
        if (!name) return null;
        const normalized = name
          .trim()
          .replace(/\b(University|College|Institute|School|of|and|&|The|the|State|Systems|Tech|Technology|Center|Centre|Intl|International)\b/gi, '')
          .replace(/[^a-zA-Z0-9\s]/g, '')
          .replace(/\s+/g, '')
          .toLowerCase();
        return normalized ? `https://${normalized}.edu` : null;
      }

      function isMetadataLine(line) {
        return /^(thought(?:signature)?|analysis|reasoning|assistant(?: reasoning)?|final|summary|plan|comment)\b[:\-\s]/i.test(line);
      }

      function parseGenAiResults(text) {
        const normalized = String(text || '')
          .replace(/\r/g, '')
          .replace(/<[^>]+>/g, '')
          .trim();
        if (!normalized) return [];

        const lines = normalized
          .split('\n')
          .map((line) => line.trim())
          .filter((line) => line && !isMetadataLine(line));
        const items = [];
        let current = null;

        lines.forEach((line) => {
          const itemMatch = line.match(/^(\d+)\s*[\.)]\s*(.*)$/);
          if (itemMatch) {
            if (current) items.push(current);
            const payload = itemMatch[2].trim();
            const splitReason = payload.split(/[:\-–—]\s*/);
            const title = splitReason.shift().trim();
            const reason = splitReason.join(' - ').trim();
            current = {
              number: Number(itemMatch[1]),
              title: title || 'Untitled Match',
              reason: reason ? [reason] : []
            };
            return;
          }
          if (!current) return;
          if (line) current.reason.push(line);
        });

        if (current) items.push(current);

        return items.slice(0, 15).map((item, index) => ({
          number: item.number || index + 1,
          title: item.title,
          reason: item.reason.map((line) => line.replace(/^[-*•]\s*/, '').trim()).filter(Boolean)
        }));
      }

      function normalizeRawHtml(html) {
        let normalized = String(html || '');
        normalized = normalized.replace(/<head[\s\S]*?<\/head>/gi, '');
        normalized = normalized.replace(/<title[\s\S]*?<\/title>/gi, '');
        normalized = normalized.replace(/<style[\s\S]*?<\/style>/gi, '');
        normalized = normalized.replace(/<script[\s\S]*?<\/script>/gi, '');
        normalized = normalized.replace(/<meta[^>]*>/gi, '');
        normalized = normalized.replace(/<!--[\s\S]*?-->/g, '');
        normalized = normalized.replace(/<\/?(?:html|body|doctype)[^>]*>/gi, '');
        return normalized.trim();
      }

      function decodeHtmlEntities(value) {
        const textarea = document.createElement('textarea');
        textarea.innerHTML = String(value || '');
        return textarea.value;
      }

      function extractNumberedLinesFromText(text) {
        const normalized = String(text || '')
          .replace(/\r/g, '')
          .replace(/<[^>]+>/g, '')
          .trim();
        return normalized
          .split('\n')
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            const match = line.match(/^(\d+)\s*[\.)]\s*(.*)$/);
            return match ? `${match[1]}. ${match[2].trim()}` : line;
          })
          .join('\n');
      }

      function parseHtmlResultsToItems(html) {
        if (!html) return [];
        html = normalizeRawHtml(html);
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        const cards = Array.from(doc.querySelectorAll('.result-card:not(.message-card), .results-container .result-card'));
        if (cards.length) {
          return cards.map((card, index) => {
            const titleEl = card.querySelector('h2');
            const title = titleEl ? titleEl.textContent.trim().replace(/^\d+\.\s*/, '') : `Match ${index + 1}`;
            const reasonEls = card.querySelectorAll('.result-reason p');
            const reason = Array.from(reasonEls)
              .map((p) => p.textContent.trim())
              .filter((line) => line && !isMetadataLine(line));
            return {
              number: index + 1,
              title: title || `Untitled Match ${index + 1}`,
              reason: reason.length ? reason : ['No reasoning available.']
            };
          });
        }

        const listItems = Array.from(doc.querySelectorAll('ol li, ul li'));
        if (listItems.length) {
          return listItems.map((li, index) => {
            const text = li.textContent.trim();
            const itemMatch = text.match(/^(\d+)\s*[\.)]\s*(.*)$/);
            const title = itemMatch ? itemMatch[2].trim() : text;
            return {
              number: itemMatch ? Number(itemMatch[1]) : index + 1,
              title,
              reason: [title]
            };
          });
        }

        const pre = doc.querySelector('pre');
        if (pre) {
          return parseGenAiResults(pre.textContent.trim());
        }

        return parseGenAiResults(doc.body.textContent.trim());
      }

      function extractTextFromHtml(html) {
        if (!html) return null;
        const cleanedHtml = normalizeRawHtml(html);
        const parser = new DOMParser();
        const doc = parser.parseFromString(cleanedHtml, 'text/html');
        const text = doc.body.textContent || '';
        return text.trim() || null;
      }

      function extractClassification(reason) {
        const normalized = String(reason || '').toLowerCase();
        const match = normalized.match(/\b(reach|target|safety)\b/);
        return match ? match[1] : null;
      }

      function formatReasonText(reason, classification) {
        let text = String(reason || '').trim();
        if (!classification) return text;
        const regex = new RegExp(`\\b${classification}\\b`, 'i');
        return text.replace(regex, '').replace(/^[\s,:;-]+/, '').trim();
      }

      function renderBadge(classification) {
        if (!classification) return null;
        const badge = document.createElement('span');
        badge.className = `result-badge result-badge-${classification}`;
        badge.textContent = classification;
        return badge;
      }

      function renderResults(items) {
        if (!items.length) return null;
        const wrapper = document.createElement('ol');
        wrapper.className = 'results-list';

        items.forEach((item) => {
          const card = document.createElement('li');
          card.className = 'result-card';

          const heading = document.createElement('h2');
          heading.className = 'result-title';
          const domain = getEduDomain(item.title);
          const titleText = `<span class="result-number">${escapeHtml(String(item.number))}.</span>`;
          if (domain) {
            heading.innerHTML = `${titleText} <a class="edu-link" href="${escapeHtml(domain)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a>`;
          } else {
            heading.innerHTML = `${titleText} ${escapeHtml(item.title)}`;
          }
          card.appendChild(heading);

          const classification = extractClassification(item.reason.join(' '));
          const reasonText = formatReasonText(item.reason.join(' '), classification);
          const meta = document.createElement('div');
          meta.className = 'result-meta';
          if (classification) {
            const badge = renderBadge(classification);
            if (badge) meta.appendChild(badge);
          }
          const description = document.createElement('p');
          description.className = 'result-description';
          description.textContent = reasonText || 'No match summary available.';
          meta.appendChild(description);
          card.appendChild(meta);

          wrapper.appendChild(card);
        });

        return wrapper;
      }

      function createMessageCard(message) {
        const card = document.createElement('section');
        card.className = 'message-card';
        const p = document.createElement('p');
        p.textContent = message;
        card.appendChild(p);
        return card;
      }

      function getResultItems(text, html) {
        const extractedText = tryExtractTextFromJson(decodeHtmlEntities(text));
        let items = parseGenAiResults(extractedText);
        if (items.length) return items;

        if (html) {
          const extracted = extractTextFromHtml(html);
          if (extracted) {
            items = parseGenAiResults(decodeHtmlEntities(extracted));
            if (items.length) return items;
          }

          const decoded = decodeHtmlEntities(html);
          items = parseGenAiResults(extractNumberedLinesFromText(decoded));
          if (items.length) return items;
        }

        return [];
      }

      function updateResults() {
        const root = document.getElementById('contentRoot');
        root.innerHTML = '';
        if (window.location.protocol === 'file:') {
          root.appendChild(createMessageCard('This page must be opened from the local server at http://localhost:3000/results.html, not directly from the filesystem.'));
          return;
        }

        const text = localStorage.getItem('genaiResultsText') || sessionStorage.getItem('genaiResultsText') || '';
        const html = localStorage.getItem('genaiResultsHtml') || sessionStorage.getItem('genaiResultsHtml') || '';

        const items = getResultItems(text, html);
        const parsed = renderResults(items);

        if (parsed) {
          root.appendChild(parsed);
          return;
        }

        root.appendChild(createMessageCard('No GenAI results could be parsed from stored data. If you just ran the query, try reloading this page.'));
        if (text || html) {
          const rawFallback = document.createElement('section');
          rawFallback.className = 'message-card';
          const pre = document.createElement('pre');
          pre.textContent = text || decodeHtmlEntities(html);
          pre.style.whiteSpace = 'pre-wrap';
          pre.style.wordBreak = 'break-word';
          rawFallback.appendChild(pre);
          root.appendChild(rawFallback);
        }
      }

      window.addEventListener('load', updateResults);
      window.addEventListener('storage', updateResults);
    </script>
  </body>
</html>
